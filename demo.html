<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#020617;color:white;min-height:100vh;}
button{cursor:pointer;font-family:'DM Sans',sans-serif;}
input,select{font-family:'DM Sans',sans-serif;}
table{border-collapse:collapse;width:100%;}
@keyframes scanLine{0%,100%{top:20%}50%{top:75%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page{animation:fadeIn .25s ease}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;border:none;font-size:13px;font-weight:500;margin-bottom:2px;text-align:left;transition:background .15s,color .15s;}
.nav-btn:hover{background:#1e293b;color:white;}
.nav-btn.active{background:#22d3ee;color:#0f172a;}
.nav-btn.inactive{background:transparent;color:#94a3b8;}
.btn-primary{background:#22d3ee;border:none;border-radius:12px;padding:12px 20px;color:#0f172a;font-weight:700;font-size:13px;transition:background .15s;}
.btn-primary:hover{background:#67e8f9;}
.btn-secondary{background:#1e293b;border:none;border-radius:12px;padding:10px 16px;color:white;font-weight:600;font-size:13px;transition:background .15s;}
.btn-secondary:hover{background:#334155;}
.input{width:100%;background:#1e293b;border:1px solid #334155;border-radius:12px;padding:11px 16px;color:white;font-size:13px;outline:none;transition:border .15s;}
.input:focus{border-color:#22d3ee;}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:20px;padding:24px;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:500;}
.th{text-align:left;padding:10px 20px;font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #1e293b;}
.td{padding:12px 20px;border-bottom:1px solid #1e293b;font-size:13px;}
tr:hover .td{background:rgba(30,41,59,0.4);}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:16px;}
</style>
</head>
<body>

<div id="app"></div>

<script>

];

// ── HELPERS ───────────────────────────────────────────────────────────────────
function genToken(){ return "TKN-"+Math.random().toString(36).toUpperCase().slice(2,10); }
function genId(){ return "v"+Date.now(); }
function avt(name,size=32,g="#22d3ee,#6366f1"){
  const i=name.split(" ").map(w=>w[0]).join("").slice(0,2);
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:linear-gradient(135deg,${g});display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:${Math.round(size*.35)}px;flex-shrink:0">${i}</div>`;
}
function statusBadge(s){
  const m={pending:["#fef3c7","#92400e","#f59e0b","Pendiente"],used:["#d1fae5","#065f46","#10b981","Usado"],expired:["#f1f5f9","#475569","#94a3b8","Expirado"],cancelled:["#fee2e2","#991b1b","#ef4444","Cancelado"]}[s]||["#fef3c7","#92400e","#f59e0b","Pendiente"];
  return `<span class="badge" style="background:${m[0]};color:${m[1]}"><span style="width:6px;height:6px;border-radius:50%;background:${m[2]};display:inline-block"></span>${m[3]}</span>`;
}
function roleBadge(r){
  const m={admin:["rgba(126,34,206,.25)","#c084fc","Admin"],resident:["rgba(8,145,178,.2)","#22d3ee","Residente"],security:["rgba(217,119,6,.2)","#fbbf24","Guardia"]}[r]||["rgba(8,145,178,.2)","#22d3ee","Residente"];
  return `<span class="badge" style="background:${m[0]};color:${m[1]}">${m[2]}</span>`;
}
function activeBadge(a){
  return `<span class="badge" style="background:${a?"rgba(16,185,129,.15)":"rgba(239,68,68,.15)"};color:${a?"#6ee7b7":"#fca5a5"}"><span style="width:6px;height:6px;border-radius:50%;display:inline-block;background:${a?"#10b981":"#ef4444"}"></span>${a?"Activo":"Inactivo"}</span>`;
}
function qrSVG(token, size=160){
  const seed=token.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const cells=21,cell=size/cells;
  let rects="";
  for(let r=0;r<cells;r++) for(let c=0;c<cells;c++){
    const isC=(r<7&&c<7)||(r<7&&c>=cells-7)||(r>=cells-7&&c<7);
    const val=isC?((r===0||r===6||c===0||c===6)||(r>=2&&r<=4&&c>=2&&c<=4)||(r>=2&&r<=4&&c>=cells-5&&c<=cells-3)||(r>=cells-5&&r<=cells-3&&c>=2&&c<=4)?1:0):((seed*(r+1)*(c+3)*7+r*13+c*17)%3===0?1:0);
    if(val)rects+=`<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}" fill="#0f172a"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="border-radius:10px"><rect width="${size}" height="${size}" fill="white"/>${rects}</svg>`;
}
function go(page,data=null){
  if(data) selectedVisit=data;
  currentPage=page;
  scanResult=null;
  render();
}
function $(id){return document.getElementById(id);}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const app=$("app");
  if(!currentUser){ app.innerHTML=loginHTML(); bindLogin(); return; }
  app.innerHTML=`<div style="display:flex;min-height:100vh">${sidebarHTML()}${mainHTML()}</div>`;
  bindNav();
  bindPage();
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────

  return `

    <div style="position:absolute;top:25%;left:50%;transform:translateX(-50%);width:400px;height:400px;background:rgba(6,182,212,.08);border-radius:50%;filter:blur(60px)"></div>
    <div style="position:absolute;bottom:25%;left:33%;width:300px;height:300px;background:rgba(99,102,241,.08);border-radius:50%;filter:blur(60px)"></div>
    <div style="width:100%;max-width:360px;position:relative">
      <div style="text-align:center;margin-bottom:32px">
        <div style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:#22d3ee;border-radius:16px;margin-bottom:16px;box-shadow:0 10px 30px rgba(34,211,238,.3)">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <h1 style="font-family:Syne,sans-serif;font-size:32px;font-weight:800;color:white">PasaYa</h1>
        <p style="color:#94a3b8;font-size:14px;margin-top:4px">Control de accesos inteligente</p>
      </div>
      <div class="card" style="box-shadow:0 25px 50px rgba(0,0,0,.5)">
        <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:6px">Correo</label><input id="lemail" class="input" placeholder="correo@ejemplo.com"/></div>
        <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:6px">Contraseña</label><input id="lpass" type="password" class="input" placeholder="••••••••"/></div>
        <div id="lerr" style="color:#f87171;font-size:12px;margin-bottom:10px;display:none"></div>
        <button id="lbtn" class="btn-primary" style="width:100%">Iniciar sesión</button>
        <div style="margin-top:20px;padding-top:20px;border-top:1px solid #1e293b">
          <p style="font-size:12px;color:#64748b;margin-bottom:8px;font-weight:500">Cuentas de demo:</p>
          ${USERS.filter(u=>["u1","u2","u3"].includes(u.id)).map(u=>`
          <button class="demo-user" data-email="${u.email}" data-pass="${u.pass}" style="width:100%;display:flex;justify-content:space-between;align-items:center;background:rgba(30,41,59,.6);border:none;border-radius:10px;padding:8px 12px;margin-bottom:6px;transition:background .15s">
            <span style="font-size:13px;color:#cbd5e1;font-weight:500">${u.name}</span>${roleBadge(u.role)}
          </button>`).join("")}

      </div>
    </div>
  </div>`;
}
function bindLogin(){
  $("lbtn").onclick=doLogin;
  $("lpass").onkeydown=e=>{if(e.key==="Enter")doLogin();};
  document.querySelectorAll(".demo-user").forEach(b=>{
    b.onmouseenter=()=>b.style.background="rgba(51,65,85,.6)";
    b.onmouseleave=()=>b.style.background="rgba(30,41,59,.6)";
    b.onclick=()=>{$("lemail").value=b.dataset.email;$("lpass").value=b.dataset.pass;};
  });
}
function doLogin(){
  const email=$("lemail").value.trim(), pass=$("lpass").value;
  const u=users.find(x=>x.email===email&&x.pass===pass);
  const err=$("lerr"), btn=$("lbtn");
  if(!u){err.textContent="Credenciales incorrectas.";err.style.display="block";return;}
  err.style.display="none";
  btn.textContent="Verificando...";btn.disabled=true;
  setTimeout(()=>{currentUser=u;currentPage="dashboard";render();},700);
}

function sidebarHTML(){

    {id:"logs",        label:"Accesos",             icon:"📋",roles:["resident","admin","security"]},
    {id:"admin-users", label:"Usuarios",            icon:"👥",roles:["admin"]},

  <aside style="width:220px;background:#0f172a;border-right:1px solid #1e293b;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;flex-shrink:0">

      <div style="width:32px;height:32px;background:#22d3ee;border-radius:8px;display:flex;align-items:center;justify-content:center"><span style="font-family:Syne,sans-serif;font-weight:900;font-size:14px;color:#0f172a">P</span></div>
      <span style="font-family:Syne,sans-serif;font-weight:800;font-size:18px;color:white">PasaYa</span>
    </div>
    <nav style="flex:1;padding:12px;overflow-y:auto">
      ${sections.map(sec=>`
        <div style="margin-bottom:16px">
          ${sec.title?`<p style="font-size:11px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.1em;padding:0 12px;margin-bottom:4px">${sec.title}</p>`:""}
          ${all.filter(n=>sec.ids.includes(n.id)).map(n=>`
            <button class="nav-btn ${currentPage===n.id?"active":"inactive"}" data-page="${n.id}">${n.icon} ${n.label}</button>
          `).join("")}

      `).join("")}

    <div style="padding:12px;border-top:1px solid #1e293b">
      <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px">
        ${avt(currentUser.name)}
        <div style="min-width:0"><p style="font-size:12px;font-weight:600;color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${currentUser.name}</p><p style="font-size:11px;color:#64748b;text-transform:capitalize">${currentUser.role}</p></div>
      </div>
      <button id="logout-btn" style="width:100%;background:none;border:none;text-align:left;padding:8px 12px;font-size:12px;color:#64748b;border-radius:8px;transition:color .15s">Cerrar sesión</button>
    </div>
  </aside>`;
}
function bindNav(){
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.onclick=()=>go(b.dataset.page);
  });
  $("logout-btn").onclick=()=>{currentUser=null;render();};
  $("logout-btn").onmouseenter=e=>e.target.style.color="#f87171";
  $("logout-btn").onmouseleave=e=>e.target.style.color="#64748b";
}

    "scan":scanHTML,"logs":logsHTML,"admin-users":adminUsersHTML,
    "admin-stats":adminStatsHTML,"admin-guards":adminGuardsHTML
  };
  const fn=pages[currentPage]||dashboardHTML;
  return `<main style="flex:1;overflow-y:auto"><div class="page">${fn()}</div></main>`;
}
function bindPage(){
  const fns={
    "dashboard":bindDashboard,"new-visit":bindNewVisit,"scan":bindScan,
    "admin-users":bindAdminUsers,"logs":()=>{},"qr-detail":()=>{},"admin-stats":()=>{},"admin-guards":()=>{}
  };
  (fns[currentPage]||(() => {}))();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function dashboardHTML(){
  const my=currentUser.role==="resident"?visits.filter(v=>v.residentId===currentUser.id):visits;
  const s={total:my.length,pending:my.filter(v=>v.status==="pending").length,used:my.filter(v=>v.status==="used").length,expired:my.filter(v=>v.status==="expired").length};
  const kpis=[{label:"Total",val:s.total,c:"#22d3ee"},{label:"Pendientes",val:s.pending,c:"#f59e0b"},{label:"Usadas",val:s.used,c:"#10b981"},{label:"Expiradas",val:s.expired,c:"#64748b"}];
  return `
  <div style="padding:24px;max-width:900px">
    <div style="margin-bottom:24px">
      <h2 style="font-family:Syne,sans-serif;font-size:24px;font-weight:800;color:white">Bienvenido, ${currentUser.name.split(" ")[0]} 👋</h2>
      <p style="color:#94a3b8;font-size:13px;margin-top:4px">${currentUser.unit?`Unidad ${currentUser.unit}`:`Rol: ${currentUser.role}`}</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">
      ${kpis.map(k=>`<div class="stat-card"><div style="width:32px;height:3px;border-radius:2px;background:${k.c};margin-bottom:12px"></div><p style="font-family:Syne,sans-serif;font-size:28px;font-weight:900;color:white">${k.val}</p><p style="font-size:12px;color:#94a3b8;margin-top:4px">${k.label}</p></div>`).join("")}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="font-family:Syne,sans-serif;font-weight:700;color:white">Visitas recientes</h3>
      ${(currentUser.role==="resident"||currentUser.role==="admin")?`<button id="btn-new-visit" class="btn-primary">+ Nueva visita</button>`:""}
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      ${my.length===0?`<div style="padding:40px;text-align:center;color:#64748b;font-size:13px">No hay visitas.</div>`:`
      <table>
        <thead><tr>${["Visitante","Residente","Fecha","Estado",""].map(h=>`<th class="th">${h}</th>`).join("")}</tr></thead>
        <tbody>
          ${my.map(v=>{const res=users.find(u=>u.id===v.residentId);return`<tr>
            <td class="td"><p style="color:white;font-weight:500">${v.visitorName}</p><p style="color:#64748b;font-size:11px">${v.visitorPhone}</p></td>
            <td class="td" style="color:#94a3b8;font-size:12px">${res?.name||""}<br><span style="color:#475569">${res?.unit||""}</span></td>
            <td class="td" style="color:#94a3b8;font-size:12px">${v.visitDate}<br>${v.visitTime}</td>
            <td class="td">${statusBadge(v.status)}</td>
            <td class="td">${v.status==="pending"?`<button class="qr-btn" data-id="${v.id}" style="background:none;border:none;color:#22d3ee;font-weight:600;font-size:12px">Ver QR →</button>`:""}</td>
          </tr>`;}).join("")}
        </tbody>
      </table>`}
    </div>
  </div>`;
}
function bindDashboard(){
  const nb=$("btn-new-visit");if(nb)nb.onclick=()=>go("new-visit");
  document.querySelectorAll(".qr-btn").forEach(b=>{
    b.onclick=()=>{const v=visits.find(x=>x.id===b.dataset.id);go("qr-detail",v);};

// ── NUEVA VISITA ──────────────────────────────────────────────────────────────
function newVisitHTML(){

      <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:6px">Nombre del visitante *</label><input id="nv-name" class="input" placeholder="Ej: Juan Pérez"/></div>

      <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:6px">Hora *</label><input id="nv-time" class="input" type="time"/></div>
      <div style="margin-bottom:20px"><label style="display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:6px">Motivo</label>
        <select id="nv-reason" class="input" style="cursor:pointer"><option value="">Seleccionar</option>${["Visita familiar","Entrega paquete","Servicio técnico","Mantenimiento","Reunión trabajo","Otro"].map(r=>`<option>${r}</option>`).join("")}</select>
      </div>
      <button id="nv-btn" class="btn-primary" style="width:100%">Crear visita y generar QR</button>
    </div>
  </div>`;
}
function bindNewVisit(){
  $("nv-btn").onclick=()=>{
    const name=$("nv-name").value.trim(),date=$("nv-date").value,time=$("nv-time").value;
    if(!name||!date||!time)return;
    const btn=$("nv-btn");btn.textContent="Generando QR...";btn.disabled=true;
    setTimeout(()=>{
      const visit={id:genId(),residentId:currentUser.id,visitorName:name,visitorPhone:$("nv-phone").value,visitDate:date,visitTime:time,reason:$("nv-reason").value,qrToken:genToken(),status:"pending",createdAt:new Date().toISOString().split("T")[0]};
      visits.unshift(visit);
      $("nv-form").style.display="none";
      $("nv-success").style.display="block";
      $("nv-success").innerHTML=`
        <div style="background:#052e16;border:1px solid #166534;border-radius:20px;padding:24px;text-align:center">
          <div style="width:48px;height:48px;background:#10b981;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
            <svg width="24" height="24" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          </div>
          <h3 style="font-family:Syne,sans-serif;color:white;margin-bottom:8px">¡Visita creada!</h3>
          <p style="color:#6ee7b7;font-size:13px;margin-bottom:20px">QR generado para ${visit.visitorName}</p>
          <div style="display:flex;justify-content:center;margin-bottom:16px">${qrSVG(visit.qrToken,150)}</div>
          <p style="font-family:monospace;font-size:12px;color:#94a3b8;margin-bottom:20px">${visit.qrToken}</p>
          <button id="nv-reset" class="btn-secondary" style="width:100%">Crear otra visita</button>
        </div>`;
      $("nv-reset").onclick=()=>go("new-visit");
    },900);
  };
}

    <h2 style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:white;margin-bottom:4px">Código QR</h2>
    <p style="color:#94a3b8;font-size:13px;margin-bottom:24px">Comparte este código con tu visitante.</p>

        <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:#94a3b8;font-size:13px">${l}</span><span style="color:white;font-weight:500;font-size:13px">${val}</span></div>`).join("")}

// ── SCAN ──────────────────────────────────────────────────────────────────────
function scanHTML(){
  const pending=visits.filter(v=>v.status==="pending");
  return `
  <div style="padding:24px;max-width:440px">
    <h2 style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:white;margin-bottom:4px">Escanear QR</h2>
    <p style="color:#94a3b8;font-size:13px;margin-bottom:24px">Verifica el acceso del visitante.</p>
    <div style="background:#0f172a;border:1px solid #334155;border-radius:20px;overflow:hidden;margin-bottom:16px">
      <div id="cam-box" style="position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#020617">
        ${["top:16px;left:16px","top:16px;right:16px","bottom:16px;left:16px","bottom:16px;right:16px"].map((pos,i)=>`
        <div style="position:absolute;${pos};width:32px;height:32px">
          <div style="position:absolute;width:16px;height:3px;background:#22d3ee;${i<2?"top":"bottom"}:0;${i%2===0?"left":"right"}:0"></div>
          <div style="position:absolute;width:3px;height:16px;background:#22d3ee;${i<2?"top":"bottom"}:0;${i%2===0?"left":"right"}:0"></div>
        </div>`).join("")}
        <div id="cam-idle" style="text-align:center"><div style="font-size:40px;margin-bottom:8px">📷</div><p style="color:#475569;font-size:12px">Cámara simulada</p></div>
        <div id="cam-scan" style="display:none;text-align:center">
          <div id="scan-line" style="position:absolute;left:16px;right:16px;height:2px;background:#22d3ee;box-shadow:0 0 10px #22d3ee;animation:scanLine 1.2s ease-in-out infinite"></div>
          <p style="color:#22d3ee;font-size:14px;font-weight:500;position:relative;z-index:1">Escaneando...</p>
        </div>
        <div id="cam-result" style="display:none;position:absolute;inset:0;align-items:center;justify-content:center"></div>
      </div>
      <div style="padding:16px;border-top:1px solid #1e293b">
        <p style="font-size:12px;color:#64748b;margin-bottom:8px">Token manual:</p>
        <div style="display:flex;gap:8px">
          <input id="scan-input" class="input" style="flex:1;font-family:monospace;font-size:12px" placeholder="TKN-XXXXXXXX"/>
          <button id="scan-btn" class="btn-primary" style="padding:8px 16px;font-size:12px">Scan</button>
        </div>
        <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">
          ${pending.slice(0,3).map(v=>`<button class="quick-token" data-token="${v.qrToken}" style="background:#334155;border:none;border-radius:8px;padding:4px 8px;color:#cbd5e1;font-size:11px;font-family:monospace">${v.qrToken}</button>`).join("")}
        </div>
      </div>
    </div>
    <div id="scan-detail"></div>
  </div>`;
}
function bindScan(){
  document.querySelectorAll(".quick-token").forEach(b=>{b.onclick=()=>$("scan-input").value=b.dataset.token;});
  $("scan-btn").onclick=doScan;
  $("scan-input").onkeydown=e=>{if(e.key==="Enter")doScan();};
}
function doScan(){
  const btn=$("scan-btn");btn.textContent="...";btn.disabled=true;
  $("cam-idle").style.display="none";
  $("cam-scan").style.display="flex";
  $("cam-result").style.display="none";
  $("scan-detail").innerHTML="";
  setTimeout(()=>{
    const token=$("scan-input").value.trim()||visits.find(v=>v.status==="pending")?.qrToken||"";
    const visit=visits.find(v=>v.qrToken===token);
    btn.textContent="Scan";btn.disabled=false;
    $("cam-scan").style.display="none";
    const res=$("cam-result");res.style.display="flex";
    if(!visit||visit.status!=="pending"){
      const msg=!visit?"Token no encontrado.":visit.status==="used"?"Acceso ya utilizado.":visit.status==="expired"?"Acceso expirado.":"Acceso cancelado.";
      res.style.background="rgba(69,10,10,.92)";
      res.innerHTML=`<div style="text-align:center;padding:16px"><div style="width:56px;height:56px;border-radius:50%;background:#ef4444;display:flex;align-items:center;justify-content:center;margin:0 auto 12px"><svg width="28" height="28" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></div><p style="font-weight:700;color:#fca5a5;font-size:15px">Acceso denegado</p><p style="color:#f87171;font-size:12px;margin-top:4px">${msg}</p></div>`;
    } else {
      res.style.background="rgba(5,46,22,.92)";
      res.innerHTML=`<div style="text-align:center;padding:16px"><div style="width:56px;height:56px;border-radius:50%;background:#10b981;display:flex;align-items:center;justify-content:center;margin:0 auto 12px"><svg width="28" height="28" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div><p style="font-weight:700;color:#6ee7b7;font-size:15px">¡Acceso válido!</p></div>`;
      $("scan-detail").innerHTML=`
        <div style="background:#0f172a;border:1px solid #166534;border-radius:20px;padding:20px">
          <h4 style="font-family:Syne,sans-serif;color:white;margin-bottom:12px">Datos del visitante</h4>
          ${[["Nombre",visit.visitorName],["Teléfono",visit.visitorPhone],["Fecha",`${visit.visitDate} · ${visit.visitTime}`],["Motivo",visit.reason]].map(([l,v])=>`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:#94a3b8;font-size:13px">${l}</span><span style="color:white;font-weight:500;font-size:13px">${v}</span></div>`).join("")}
          <button id="approve-btn" class="btn-primary" style="width:100%;margin-top:12px">✓ Registrar entrada</button>
        </div>`;
      $("approve-btn").onclick=()=>{
        visits=visits.map(x=>x.id===visit.id?{...x,status:"used"}:x);
        logs.unshift({visitId:visit.id,guardId:currentUser.id,entryTime:new Date().toLocaleTimeString("es-HN"),date:new Date().toISOString().split("T")[0]});
        $("approve-btn").outerHTML=`<p style="text-align:center;color:#6ee7b7;font-weight:500;font-size:13px;margin-top:12px">✓ Entrada registrada</p>`;
      };
    }
  },1400);
}

// ── LOGS ──────────────────────────────────────────────────────────────────────
function logsHTML(){
  const my=currentUser.role==="resident"?visits.filter(v=>v.residentId===currentUser.id):visits;

  return `
  <div style="padding:24px;max-width:900px">
    <h2 style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:white;margin-bottom:4px">Registros de acceso</h2>
    <p style="color:#94a3b8;font-size:13px;margin-bottom:24px">Historial de entradas registradas.</p>
    <div class="card" style="padding:0;overflow:hidden">
      ${ml.length===0?`<div style="padding:40px;text-align:center;color:#64748b;font-size:13px">No hay registros aún.</div>`:`
      <table><thead><tr>${["Visitante","Token","Fecha","Hora","Guardia","Estado"].map(h=>`<th class="th">${h}</th>`).join("")}</tr></thead>
      <tbody>${[...ml].reverse().map(log=>{const v=visits.find(x=>x.id===log.visitId);const g=users.find(x=>x.id===log.guardId);return`<tr><td class="td" style="color:white;font-weight:500">${v?.visitorName||"—"}</td><td class="td" style="font-family:monospace;font-size:11px;color:#22d3ee">${v?.qrToken||"—"}</td><td class="td" style="color:#94a3b8">${log.date}</td><td class="td" style="color:#94a3b8">${log.entryTime}</td><td class="td" style="color:#94a3b8">${g?.name||"—"}</td><td class="td">${statusBadge("used")}</td></tr>`;}).join("")}</tbody></table>`}
    </div>
  </div>`;
}

// ── ADMIN: USUARIOS ───────────────────────────────────────────────────────────
function adminUsersHTML(){
  return `
  <div style="padding:24px;max-width:900px">
    <h2 style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:white;margin-bottom:4px">Gestión de usuarios</h2>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px">
      ${["resident","security","admin"].map(role=>`<div class="stat-card"><p style="font-family:Syne,sans-serif;font-size:28px;font-weight:900;color:white;margin-bottom:8px">${users.filter(u=>u.role===role).length}</p>${roleBadge(role)}</div>`).join("")}

              <button class="toggle-active-btn" data-id="${u.id}" style="background:none;border:none;font-weight:600;font-size:12px;color:${u.active?"#f87171":"#6ee7b7"}">${u.active?"Desactivar":"Activar"}</button>
            </div>
          </td>
        </tr>`).join("")}
      </tbody></table>

}
function bindAdminUsers(){
  document.querySelectorAll(".edit-role-btn").forEach(b=>{
    b.onclick=()=>{
      const cell=$(`role-cell-${b.dataset.id}`);
      cell.innerHTML=`<select class="input" id="role-sel-${b.dataset.id}" style="padding:4px 8px;font-size:12px;width:auto">${["resident","security","admin"].map(r=>`<option${r===b.dataset.role?" selected":""}>${r}</option>`).join("")}</select> <button class="save-role-btn" data-id="${b.dataset.id}" style="background:#22d3ee;border:none;border-radius:6px;padding:3px 10px;color:#0f172a;font-weight:700;font-size:11px;margin-left:4px">OK</button>`;
      document.querySelector(`.save-role-btn[data-id="${b.dataset.id}"]`).onclick=()=>{
        const nr=$(`role-sel-${b.dataset.id}`).value;
        users=users.map(u=>u.id===b.dataset.id?{...u,role:nr}:u);
        go("admin-users");
      };
    };
  });
  document.querySelectorAll(".toggle-active-btn").forEach(b=>{
    b.onclick=()=>{users=users.map(u=>u.id===b.dataset.id?{...u,active:!u.active}:u);go("admin-users");};
  });
}

// ── ADMIN: STATS ──────────────────────────────────────────────────────────────
function adminStatsHTML(){
  const byS={pending:0,used:0,expired:0,cancelled:0};visits.forEach(v=>{byS[v.status]=(byS[v.status]||0)+1;});
  const byR={};visits.forEach(v=>{const u=users.find(x=>x.id===v.residentId);const n=u?.name||"?";byR[n]=(byR[n]||0)+1;});
  const byM={};visits.forEach(v=>{if(v.reason)byM[v.reason]=(byM[v.reason]||0)+1;});
  const maxR=Math.max(...Object.values(byR),1),maxM=Math.max(...Object.values(byM),1);
  const cols=["#22d3ee","#6366f1","#f59e0b","#10b981","#a855f7","#ec4899"];
  const statusColor={pending:"#f59e0b",used:"#10b981",expired:"#64748b",cancelled:"#ef4444"};
  return `
  <div style="padding:24px;max-width:900px">
    <h2 style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:white;margin-bottom:4px">Estadísticas</h2>
    <p style="color:#94a3b8;font-size:13px;margin-bottom:24px">Resumen de actividad de la comunidad.</p>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">
      ${[{l:"Total visitas",v:visits.length,i:"📋",b:"#164e63"},{l:"Accesos registrados",v:logs.length,i:"✅",b:"#14532d"},{l:"Residentes activos",v:users.filter(u=>u.role==="resident"&&u.active).length,i:"🏠",b:"#1e1b4b"},{l:"Guardias activos",v:users.filter(u=>u.role==="security"&&u.active).length,i:"🔒",b:"#451a03"}].map(k=>`
      <div style="background:#0f172a;border:1px solid ${k.b};border-radius:16px;padding:20px"><div style="font-size:24px;margin-bottom:8px">${k.i}</div><p style="font-family:Syne,sans-serif;font-size:28px;font-weight:900;color:white">${k.v}</p><p style="font-size:12px;color:#94a3b8;margin-top:4px">${k.l}</p></div>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">
        <h3 style="font-family:Syne,sans-serif;color:white;margin-bottom:16px;font-size:15px">Visitas por estado</h3>
        ${Object.entries(byS).map(([s,c])=>{const pct=visits.length>0?Math.round((c/visits.length)*100):0;return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px">${statusBadge(s)}<span style="color:white;font-weight:700;font-size:13px">${c} <span style="color:#64748b;font-weight:400;font-size:11px">(${pct}%)</span></span></div><div style="height:6px;background:#1e293b;border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${statusColor[s]};border-radius:3px"></div></div></div>`;}).join("")}
      </div>
      <div class="card">
        <h3 style="font-family:Syne,sans-serif;color:white;margin-bottom:16px;font-size:15px">Motivos frecuentes</h3>
        ${Object.entries(byM).sort((a,b)=>b[1]-a[1]).map(([m,c],i)=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:#cbd5e1;font-size:12px">${m}</span><span style="color:white;font-weight:700;font-size:13px">${c}</span></div><div style="height:6px;background:#1e293b;border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.round((c/maxM)*100)}%;background:${cols[i%cols.length]};border-radius:3px"></div></div></div>`).join("")}
      </div>
    </div>
    <div class="card">
      <h3 style="font-family:Syne,sans-serif;color:white;margin-bottom:16px;font-size:15px">Visitas por residente</h3>
      ${Object.entries(byR).sort((a,b)=>b[1]-a[1]).map(([name,c],i)=>`
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <span style="color:#64748b;font-size:12px;width:16px;text-align:right">${i+1}</span>${avt(name,32)}
        <div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:white;font-size:12px;font-weight:500">${name}</span><span style="color:white;font-weight:700;font-size:13px">${c}</span></div><div style="height:6px;background:#1e293b;border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.round((c/maxR)*100)}%;background:${cols[i%cols.length]};border-radius:3px"></div></div></div>
      </div>`).join("")}
    </div>
  </div>`;
}

        <td class="td" style="color:white;font-weight:500">${v?.visitorName||"—"}</td>
        <td class="td" style="font-family:monospace;font-size:11px;color:#22d3ee">${v?.qrToken||"—"}</td>
        <td class="td" style="color:#94a3b8">${log.date}</td>
        <td class="td" style="color:#94a3b8">${log.entryTime}</td>
      </tr>`;}).join("")}</tbody></table>`}
    </div>
  </div>`;
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
